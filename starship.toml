"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$all\
$fill\
$git_branch\
$git_status\
$line_break\
$character
"""

[username]
show_always = true
format = '[[в–‘в–’в–“](#82aaff) $user]($style)[@](bg:#1d2230)'
style_user = 'bold fg:#82aaff bg:#1d2230'

[hostname]
ssh_only = false
format = '[$ssh_symbol$hostname [оӮҙ](fg:#c099ff)]($style) in '
style = 'bold fg:#c099ff bg:#1d2230'

[directory]
format = '[[в–‘в–’в–“](fg:#86e1fc) $path $read_only[оӮҙ](fg:#86e1fc)]($style) '
style = 'bold fg:#86e1fc bg:#1d2230'

[directory.substitutions]
"Documents" = "у°Ҳҷ"
"Downloads" = "пҖҷ"
"Music" = "у°қҡ"
"Pictures" = "пҖҫ"
"Videos" = "пҖҪ"
"Developer" = "у°ІӢ"

[git_branch]
symbol = "пҗҳ"
format = ' [[оӮ¶](fg:#ff9e64) $symbol $branch ]($style)'
style = "bold fg:#ff9e64 bg:#1d2230"

[git_status]
format = '([$all_status$ahead_behind[оӮҙ](fg:#1d2230)]($style) )'
style = "bold fg:#ff9e64 bg:#1d2230"

[nix_shell]
format = 'in [[в–‘в–’в–“](fg:blue) $symbol$name$state [оӮҙ](fg:blue)]($style) '
impure_msg = ''
pure_msg = ' у°Ҹ“'
style = 'bold fg:blue bg:#1d2230'

[c]
symbol = "оҳһ "
format = 'using [[оӮ¶](fg:#1d2230) $symbol($version(-$name) )[оӮҙ ](fg:#1d2230)]($style)'
style = 'bold fg:149 bg:#1d2230'

[rust]
symbol = "уұҳ— "
format = 'using [[оӮ¶](fg:#1d2230) $symbol($version(-$name) )[оӮҙ ](fg:#1d2230)]($style)'
style = 'bold fg:#c45508 bg:#1d2230'

[zig]
symbol = "оЈҜ "
format = 'using [[оӮ¶](fg:#1d2230) $symbol($version )[оӮҙ ](fg:#1d2230)]($style)'
style = 'bold fg:#f7a41d bg:#1d2230'

[golang]
symbol = "оҳ§ "
format = 'using [[оӮ¶](fg:#1d2230) $symbol($version )[оӮҙ ](fg:#1d2230)]($style)'
style = "bold fg:cyan bg:#1d2230"

[python]
symbol = "оҳҶ "
format = 'using [[оӮ¶](fg:#1d2230) $symbol($version )[оӮҙ ](fg:#1d2230)]($style)'
style = 'bold fg:#ffd43b bg:#1d2230'

[lua]
symbol = "у°ўұ "
format = 'using [[оӮ¶](fg:#1d2230) $symbol($version )[оӮҙ ](fg:#1d2230)]($style)'
style = "bold fg:blue bg:#1d2230"

[ruby]
symbol = "оҳ… "
format = 'using [[оӮ¶](fg:#1d2230) $symbol($version )[оӮҙ ](fg:#1d2230)]($style)'
style = "bold fg:#e0115f bg:#1d2230"

[package]
format = 'is [[оӮ¶](fg:#1d2230) $symbol($version )[оӮҙ ](fg:#1d2230)]($style)'
style = 'bold fg:208 bg:#1d2230'

[cmake]
symbol = "оһ” "
format = 'via [[оӮ¶](fg:#1d2230) $symbol($version )[оӮҙ ](fg:#1d2230)]($style)'
style = 'bold fg:blue bg:#1d2230'

[nodejs]
format = 'using [[оӮ¶](fg:#1d2230) $symbol($version )[оӮҙ ](fg:#1d2230)]($style)'
style = 'bold fg:green bg:#1d2230'

[bun]
symbol = "оқҜ "
format = 'using [[оӮ¶](fg:#1d2230) $symbol($version )[оӮҙ ](fg:#1d2230)]($style)'
style = 'bold fg:#fbf0df bg:#1d2230'

[cmd_duration]
disabled = true
